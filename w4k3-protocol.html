<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>W4K3 PR0T0C0L - DEDSEC</title>
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <!-- BG Triangles (dynamic mesh) -->
  <canvas id="bg-triangles"></canvas>
  
  <!-- Scanlines effect -->
  <div class="scanlines"></div>

  <header class="header">
    <img src="assets/Banners/Home.jpg" alt="DEDSEC" class="header-image">
    <div class="header-overlay">
      <h1 class="logo glitch" data-text="DEDSEC">DEDSEC</h1>
      <p class="subtitle">W4K3 PR0T0C0L</p>
    </div>
  </header>

  <main class="page-content">
    <a href="index.html" class="back-button">← VOLTAR</a>

    <div class="page-header">
      <h1 class="page-title">W4K3 PR0T0C0L</h1>
      <p class="page-subtitle">Protocolo de Despertar - Últimas atualizações</p>
    </div>

    <!-- Container para notícias carregadas dinamicamente -->
    <div id="noticias-container" class="noticias-container">
      <!-- Notícias serão carregadas aqui via JavaScript -->
      <div class="content-section">
        <h2 style="margin-bottom: 1rem; color: var(--color-primary);">CARREGANDO NOTÍCIAS...</h2>
        <p style="line-height: 1.8; opacity: 0.9;">
          Aguarde enquanto carregamos as últimas atualizações...
        </p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>DEDSEC © 2024 | EXPECT US</p>
  </footer>

  <script>
    // Background Triangles Animation
    const triCanvas = document.getElementById('bg-triangles');
    const triCtx = triCanvas ? triCanvas.getContext('2d') : null;

    const TRI_CONFIG = {
      rows: 2,
      cols: 4,
      amplitude: 90,
      speed: 0.0002
    };

    let triPoints = [];
    let triStartTime = performance.now();

    function initTriangles() {
      if (!triCanvas || !triCtx) return;
      const w = window.innerWidth;
      const h = window.innerHeight;
      triCanvas.width = w;
      triCanvas.height = h;

      triPoints = [];
      const { rows, cols } = TRI_CONFIG;
      const margin = 0.18;
      const spanX = 1 + margin * 2;
      const spanY = 1 + margin * 2;
      for (let y = 0; y <= rows; y++) {
        for (let x = 0; x <= cols; x++) {
          const px = (-margin + (x / cols) * spanX) * w;
          const py = (-margin + (y / rows) * spanY) * h;
          const phase = Math.random() * Math.PI * 2;
          triPoints.push({ baseX: px, baseY: py, phase });
        }
      }
    }

    function getAccentColor() {
      const cs = getComputedStyle(document.documentElement);
      const c = cs.getPropertyValue('--accent-color').trim();
      return c || '#ffffff';
    }

    function drawTriangles(time) {
      if (!triCanvas || !triCtx || !triPoints.length) return;
      const w = triCanvas.width;
      const h = triCanvas.height;
      triCtx.clearRect(0, 0, w, h);

      const color = getAccentColor();
      triCtx.strokeStyle = color;
      triCtx.lineWidth = 0.7;
      triCtx.globalAlpha = 0.35;

      const { rows, cols, amplitude, speed } = TRI_CONFIG;
      const t = (time - triStartTime);

      const animated = triPoints.map(p => {
        const offset = Math.sin(t * speed + p.phase);
        const x = p.baseX + offset * amplitude;
        const y = p.baseY + Math.cos(t * speed * 1.3 + p.phase) * amplitude * 0.6;
        return { x, y };
      });

      const idx = (x, y) => y * (cols + 1) + x;

      triCtx.beginPath();
      for (let y = 0; y < TRI_CONFIG.rows; y++) {
        for (let x = 0; x < TRI_CONFIG.cols; x++) {
          const p0 = animated[idx(x, y)];
          const p1 = animated[idx(x + 1, y)];
          const p2 = animated[idx(x, y + 1)];
          const p3 = animated[idx(x + 1, y + 1)];

          triCtx.moveTo(p0.x, p0.y);
          triCtx.lineTo(p1.x, p1.y);
          triCtx.lineTo(p3.x, p3.y);

          triCtx.moveTo(p0.x, p0.y);
          triCtx.lineTo(p3.x, p3.y);
          triCtx.lineTo(p2.x, p2.y);
        }
      }
      triCtx.stroke();
      triCtx.globalAlpha = 1;
    }

    function animateTriangles(time) {
      drawTriangles(time || performance.now());
      requestAnimationFrame(animateTriangles);
    }

    if (triCanvas && triCtx) {
      initTriangles();
      window.addEventListener('resize', initTriangles);
      requestAnimationFrame(animateTriangles);
    }

    // Carregar notícias do JSON gerado pelo n8n
    fetch('data/daily-content.json')
      .then(res => {
        if (!res.ok) throw new Error('Arquivo não encontrado');
        return res.json();
      })
      .then(data => {
        const container = document.getElementById('noticias-container');
        container.innerHTML = ''; // Limpar conteúdo de carregamento

        if (data.noticias && data.noticias.length > 0) {
          data.noticias.forEach((noticia, index) => {
            const section = document.createElement('div');
            section.className = 'content-section';
            section.style.animationDelay = `${index * 0.1}s`;
            section.innerHTML = `
              <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                <h2 style="margin: 0; color: var(--color-primary); flex: 1;">${noticia.titulo || 'Notícia'}</h2>
                <small style="opacity: 0.6; font-size: 0.8rem; margin-left: 1rem; white-space: nowrap;">${new Date(noticia.data || data.date).toLocaleDateString('pt-BR')}</small>
              </div>
              <p style="line-height: 1.8; opacity: 0.9; white-space: pre-line;">${noticia.conteudo || 'Conteúdo não disponível.'}</p>
            `;
            container.appendChild(section);
          });
        } else {
          container.innerHTML = `
            <div class="content-section">
              <h2 style="margin-bottom: 1rem; color: var(--color-primary);">NENHUMA NOTÍCIA DISPONÍVEL</h2>
              <p style="line-height: 1.8; opacity: 0.9;">
                As notícias serão atualizadas em breve. Verifique novamente mais tarde.
              </p>
            </div>
          `;
        }
      })
      .catch(err => {
        console.error('Erro ao carregar notícias:', err);
        const container = document.getElementById('noticias-container');
        container.innerHTML = `
          <div class="content-section">
            <h2 style="margin-bottom: 1rem; color: var(--color-primary);">ERRO AO CARREGAR NOTÍCIAS</h2>
            <p style="line-height: 1.8; opacity: 0.9;">
              Não foi possível carregar as notícias no momento. Verifique se o arquivo data/daily-content.json existe e está acessível.
            </p>
            <p style="line-height: 1.8; opacity: 0.7; margin-top: 1rem; font-size: 0.9rem;">
              Erro: ${err.message}
            </p>
          </div>
        `;
      });
  </script>
</body>
</html>
